<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ReviewScope - 분석</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="left-sidebar">
    <div class="brand">
        Review<span>Scope</span>
    </div>
    <ul class="menu-list">
        <li><a class="menu-item" th:href="@{/}">홈</a></li>
        <li><a class="menu-item active" th:href="@{/analyze}">분석</a></li>
        <li><a class="menu-item">분석 기록</a></li>
        <li><a class="menu-item">설정</a></li>
    </ul>
</div>

<div class="main-container analyze-layout">
    <div class="analyze-wrapper">
        <header class="page-header">
            <h1>키워드로 정밀 분석하기</h1>
            <p>
                제품명을 직접 입력해서 커뮤니티 여론을 깊게 분석해보세요.<br>
                DC, 클리앙, 퀘이사존, 펨코의 최신 글을 기반으로 여론을 분석합니다.
            </p>
        </header>

        <section class="section-card analyze-card">
            <div class="analyze-title-row">
                <span class="analyze-icon">🔍</span>
                <span class="analyze-title">무엇을 분석할까요?</span>
            </div>

            <p class="analyze-sub">
                제품명 또는 키워드를 입력하면 커뮤니티 최신 글을 기반으로 여론을 분석합니다.
            </p>

            <form class="analyze-form" id="analyzeForm">
                <input
                    type="text"
                    id="keywordInput"
                    name="keyword"
                    placeholder="제품명 또는 키워드를 입력하세요 (예: G304)"
                    required
                >
                <button type="submit" class="btn-submit" id="startBtn">
                    🧪 분석 시작
                </button>
            </form>

            <p class="tip">모델명을 적어주세요.</p>
        </section>

        <section class="category-top5-wrapper">
            <div class="category-top5-tabs">
                <button class="top5-tab active" data-category="mouse" type="button">마우스</button>
                <button class="top5-tab" data-category="keyboard" type="button">키보드</button>
                <button class="top5-tab" data-category="headset" type="button">헤드셋</button>
                <button class="top5-tab" data-category="monitor" type="button">모니터</button>
            </div>

            <div class="category-top5-card">
                <div class="category-top5-header">
                    <span class="label" id="top5-title">마우스 TOP 5</span>
                    <span class="more">자세히 보기 &gt;</span>
                </div>
                <ul class="top5-list" id="top5-list"></ul>
            </div>
        </section>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const analyzeForm = document.getElementById('analyzeForm');
    const keywordInput = document.getElementById('keywordInput');

    if (analyzeForm) {
        analyzeForm.addEventListener('submit', function (e) {
            e.preventDefault();

            const keyword = keywordInput.value.trim();
            if (!keyword) return;

            fetch('/search', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: new URLSearchParams({ keyword })
            })
            .then(res => res.json())
            .then(data => {
                const nextKeyword = data.keyword || keyword;
                window.location.href = `/analyze/result?keyword=${encodeURIComponent(nextKeyword)}`;
            })
            .catch(err => {
                console.error('분석 시작 요청 실패:', err);
                alert('분석 시작 중 오류가 발생했습니다. 다시 시도해주세요.');
            });
        });
    }

    const rankingData = {
        mouse: [
            { rank: 1, name: "로지텍 G PRO X SUPERLIGHT 2" },
            { rank: 2, name: "레이저 데스애더 V3 PRO" },
            { rank: 3, name: "로지텍 G102 2세대" },
            { rank: 4, name: "팜그립 게이밍 마우스 A" },
            { rank: 5, name: "초경량 게이밍 마우스 B" }
        ],
        keyboard: [
            { rank: 1, name: "키크론 Q1 Pro" },
            { rank: 2, name: "앱코 K640" },
            { rank: 3, name: "레오폴드 FC750R" },
            { rank: 4, name: "체리 MX Board 3.0S" },
            { rank: 5, name: "COX CK87" }
        ],
        headset: [
            { rank: 1, name: "로지텍 G PRO X 2" },
            { rank: 2, name: "HyperX Cloud III" },
            { rank: 3, name: "SteelSeries Arctis Nova 7" },
            { rank: 4, name: "Sony INZONE H9" },
            { rank: 5, name: "Razer BlackShark V2 Pro" }
        ],
        monitor: [
            { rank: 1, name: "LG 울트라기어 27GR95QE" },
            { rank: 2, name: "삼성 오디세이 G5" },
            { rank: 3, name: "델 S2721DGF" },
            { rank: 4, name: "MSI MAG 274QRF-QD" },
            { rank: 5, name: "기가바이트 M27Q" }
        ]
    };

    const titleEl = document.getElementById('top5-title');
    const listEl = document.getElementById('top5-list');
    const tabs = document.querySelectorAll('.top5-tab');

    function renderTop5(category) {
        const labelMap = {
            mouse: '마우스',
            keyboard: '키보드',
            headset: '헤드셋',
            monitor: '모니터'
        };

        const items = rankingData[category] || [];
        titleEl.textContent = `${labelMap[category]} TOP 5`;

        listEl.innerHTML = items.map(item => `
            <li class="top5-item">
                <span class="top5-rank">${item.rank}</span>
                <span class="top5-name">${item.name}</span>
            </li>
        `).join('');
    }

    tabs.forEach(tab => {
        tab.addEventListener('click', function () {
            tabs.forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            renderTop5(this.dataset.category);
        });
    });

    renderTop5('mouse');
});
</script>
</body>
</html>
