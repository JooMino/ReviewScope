<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ReviewScope - 분석</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="left-sidebar">
    <div class="brand">
        Review<span>Scope</span>
    </div>
    <ul class="menu-list">
        <li><a class="menu-item" th:href="@{/}">홈</a></li>
        <li><a class="menu-item active" th:href="@{/analyze}">분석</a></li>
        <li><a class="menu-item">분석 기록</a></li>
        <li><a class="menu-item">설정</a></li>
    </ul>
</div>

<div class="main-container analyze-layout">
    <div class="analyze-wrapper">
        <header class="page-header">
            <h1>키워드로 정밀 분석하기</h1>
            <p>
                제품명을 직접 입력해서 커뮤니티 여론을 깊게 분석해보세요.<br>
                DC, 클리앙, 퀘이사존, 펨코의 최신 글을 기반으로 여론을 분석합니다.
            </p>
        </header>

        <section class="analyze-card">
            <div class="analyze-title-row">
                <span class="analyze-icon">🔍</span>
                <span class="analyze-title">무엇을 분석할까요?</span>
            </div>

            <p class="analyze-sub">
                제품명 또는 키워드를 입력하면 커뮤니티 최신 글을 기반으로 여론을 분석합니다.
            </p>

            <form class="analyze-form" id="analyzeForm" onsubmit="return false;">
                <input type="text"
                       id="keywordInput"
                       name="keyword"
                       placeholder="제품명 또는 키워드를 입력하세요 (예: 로지텍 G304)"
                       required>
                <button type="submit" class="btn-submit" id="startBtn">
                    🧪 정밀 분석 시작
                </button>
            </form>

            <p class="tip">모델명을 적어주세요.</p>
        </section>

        <section class="category-top5-wrapper">
            <div class="category-top5-tabs">
                <button class="top5-tab active" data-category="mouse">마우스</button>
                <button class="top5-tab" data-category="keyboard">키보드</button>
                <button class="top5-tab" data-category="headset">헤드셋</button>
                <button class="top5-tab" data-category="monitor">모니터</button>
            </div>

            <div class="category-top5-card">
                <div class="category-top5-header">
                    <span class="label" id="top5-title">마우스 TOP 5</span>
                    <span class="more">자세히 보기 &gt;</span>
                </div>
                <ul class="top5-list" id="top5-list"></ul>
            </div>
        </section>
    </div>

    <aside class="analyze-result-panel" id="resultPanel">
        <div class="result-card" id="resultCard">
            <h2 class="result-title">분석 결과</h2>
            <div id="resultContent">
                <p class="analyze-sub">분석을 시작하면 이곳에 결과가 표시됩니다.</p>
            </div>
        </div>
    </aside>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const analyzeForm = document.getElementById('analyzeForm');
    const resultContent = document.getElementById('resultContent');
    const keywordInput = document.getElementById('keywordInput');

    if (analyzeForm) {
        analyzeForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const keyword = keywordInput.value.trim();
            if (!keyword) return;

            resultContent.innerHTML = `
                <div class="loading-container">
                    <p><strong>"${keyword}"</strong> 분석 중...</p>
                    <div class="spinner"></div>
                    <p class="tip">전국 커뮤니티의 데이터를 수집하고 있습니다.<br>잠시만 기다려 주세요.</p>
                </div>
            `;

            fetch('/search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ keyword: keyword })
            })
            .then(res => res.json())
            .then(data => {
                console.log("분석 시작 응답:", data);
                checkStatus(data.keyword);
            })
            .catch(err => {
                console.error("요청 실패:", err);
                resultContent.innerHTML = `<p style="color:red;">오류가 발생했습니다. 다시 시도해주세요.</p>`;
            });
        });
    }

    function checkStatus(keyword) {
        const interval = setInterval(() => {
            fetch(`/api/crawl/status?keyword=${encodeURIComponent(keyword)}`)
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'DONE') {
                        clearInterval(interval);
                        fetchFinalResult(keyword);
                    } else if (data.status === 'FAILED') {
                        clearInterval(interval);
                        resultContent.innerHTML = `<p style="color:red;">분석에 실패했습니다.</p>`;
                    }
                })
                .catch(err => {
                    clearInterval(interval);
                    console.error("상태 체크 실패:", err);
                    resultContent.innerHTML = `<p style="color:red;">상태 확인 중 오류가 발생했습니다.</p>`;
                });
        }, 2000);
    }

    function fetchFinalResult(keyword) {
        fetch(`/api/result-data?keyword=${encodeURIComponent(keyword)}`)
            .then(res => res.json())
            .then(data => {
                renderResult(data);
            })
            .catch(err => {
                console.error("결과 조회 실패:", err);
                resultContent.innerHTML = `<p style="color:red;">결과를 불러오지 못했습니다.</p>`;
            });
    }

    function renderResult(data) {
        if (data.error) {
            resultContent.innerHTML = `<p style="color:red;">${data.error}</p>`;
            return;
        }

        const clean = (text) => {
            if (text == null) return '';
            if (typeof text !== 'string') return text;
            return text.replace(/[#*]/g, '').trim();
        };

        const pros = Array.isArray(data.pros) ? data.pros : [];
        const cons = Array.isArray(data.cons) ? data.cons : [];
        const models = Array.isArray(data.models) ? data.models : [];

        const prosHtml = pros.length > 0
            ? pros.map(p => `<li>${clean(p)}</li>`).join('')
            : "<li>데이터 없음</li>";

        const consHtml = cons.length > 0
            ? cons.map(c => `<li>${clean(c)}</li>`).join('')
            : "<li>데이터 없음</li>";

        const modelsHtml = models.length > 0
            ? models.map(m => `<li>${clean(m)}</li>`).join('')
            : "<li>언급된 모델 없음</li>";

        // 아직 백엔드 안 붙은 기능은 예시용 mock 데이터
        const mockIssues = [
            { label: "불량 이슈", percent: 18 },
            { label: "배터리 문제", percent: 26 },
            { label: "착용감 압박", percent: 14 },
            { label: "노이즈 캔슬링", percent: 22 }
        ];

        const mockIssueHtml = mockIssues.map(issue => `
            <div style="margin-bottom: 14px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:6px;">
                    <span>${issue.label}</span>
                    <strong>${issue.percent}%</strong>
                </div>
                <div style="background:#2a2d34; border-radius:999px; height:10px; overflow:hidden;">
                    <div style="width:${issue.percent}%; height:100%; background:var(--accent);"></div>
                </div>
            </div>
        `).join('');

        const mockReferenceHtml = `
            <div style="display:flex; flex-direction:column; gap:10px;">
                <div style="padding:12px; border-radius:10px; background:rgba(255,255,255,0.03);">
                    <strong>예시) 착용감이 머리 큰 사용자에게 타이트하다는 의견</strong>
                    <div style="margin-top:8px; font-size:14px; opacity:0.85;">
                        - 디시 링크 예시<br>
                        - 클리앙 링크 예시<br>
                        - 퀘이사존 링크 예시
                    </div>
                </div>
                <div style="padding:12px; border-radius:10px; background:rgba(255,255,255,0.03);">
                    <strong>예시) 배터리 지속시간이 기대보다 짧다는 의견</strong>
                    <div style="margin-top:8px; font-size:14px; opacity:0.85;">
                        - 펨코 링크 예시<br>
                        - 디시 링크 예시
                    </div>
                </div>
            </div>
        `;

        const mockModelChartHtml = `
            <div style="display:flex; flex-direction:column; gap:12px; margin-top:8px;">
                <div>
                    <div style="display:flex; justify-content:space-between; margin-bottom:6px;">
                        <span>QCY H3</span><strong>32%</strong>
                    </div>
                    <div style="background:#2a2d34; border-radius:999px; height:10px; overflow:hidden;">
                        <div style="width:32%; height:100%; background:#FFD700;"></div>
                    </div>
                </div>
                <div>
                    <div style="display:flex; justify-content:space-between; margin-bottom:6px;">
                        <span>앤커 Q45</span><strong>24%</strong>
                    </div>
                    <div style="background:#2a2d34; border-radius:999px; height:10px; overflow:hidden;">
                        <div style="width:24%; height:100%; background:#FFD700;"></div>
                    </div>
                </div>
                <div>
                    <div style="display:flex; justify-content:space-between; margin-bottom:6px;">
                        <span>CH720N</span><strong>16%</strong>
                    </div>
                    <div style="background:#2a2d34; border-radius:999px; height:10px; overflow:hidden;">
                        <div style="width:16%; height:100%; background:#FFD700;"></div>
                    </div>
                </div>
            </div>
        `;

        const mockTimelineHtml = `
            <div style="margin-top:10px;">
                <div style="display:flex; align-items:flex-end; gap:10px; height:180px;">
                    <div style="flex:1; background:#3a7afe; height:35%; border-radius:8px 8px 0 0; position:relative;">
                        <span style="position:absolute; bottom:-26px; left:50%; transform:translateX(-50%); font-size:12px;">1주차</span>
                    </div>
                    <div style="flex:1; background:#3a7afe; height:55%; border-radius:8px 8px 0 0; position:relative;">
                        <span style="position:absolute; bottom:-26px; left:50%; transform:translateX(-50%); font-size:12px;">2주차</span>
                    </div>
                    <div style="flex:1; background:#3a7afe; height:48%; border-radius:8px 8px 0 0; position:relative;">
                        <span style="position:absolute; bottom:-26px; left:50%; transform:translateX(-50%); font-size:12px;">3주차</span>
                    </div>
                    <div style="flex:1; background:#3a7afe; height:62%; border-radius:8px 8px 0 0; position:relative;">
                        <span style="position:absolute; bottom:-26px; left:50%; transform:translateX(-50%); font-size:12px;">4주차</span>
                    </div>
                </div>
                <p style="margin-top:36px; font-size:13px; opacity:0.8;">
                    예시 그래프: 시간에 따른 긍정/부정 또는 이슈 언급량 추이를 표시할 예정
                </p>
            </div>
        `;

        resultContent.innerHTML = `
            <div class="report-container" style="display:flex; flex-direction:column; gap:20px;">

                <!-- 실제 데이터 -->
                <section class="result-section" style="background:var(--bg-card); padding:20px; border-radius:12px;">
                    <h3 style="margin-bottom:8px;">📌 분석 키워드</h3>
                    <p style="margin:0;">${clean(data.summary || '내용 없음')}</p>
                </section>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                    <section class="result-section" style="background:var(--bg-card); padding:20px; border-radius:12px; border-left:4px solid var(--accent);">
                        <h3 style="color:var(--accent);">👍 장점</h3>
                        <p style="margin-bottom:12px;">${clean(data.positiveSummary || '내용 없음')}</p>
                        <ul class="result-list" style="padding-left:20px;">${prosHtml}</ul>
                    </section>

                    <section class="result-section" style="background:var(--bg-card); padding:20px; border-radius:12px; border-left:4px solid var(--accent-red);">
                        <h3 style="color:var(--accent-red);">👎 단점</h3>
                        <p style="margin-bottom:12px;">${clean(data.negativeSummary || '내용 없음')}</p>
                        <ul class="result-list" style="padding-left:20px;">${consHtml}</ul>
                    </section>
                </div>

                <section class="result-section" style="background:var(--bg-card); padding:20px; border-radius:12px; border-top:4px solid #FFD700;">
                    <h3 style="color:#FFD700;">함께 언급된 모델</h3>
                    <ul class="result-list" style="line-height:1.8;">
                        ${modelsHtml}
                    </ul>
                </section>

                <!-- 예시 UI -->
                <section class="result-section" style="background:var(--bg-card); padding:20px; border-radius:12px;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                        <h3 style="margin:0;">📊 주요 이슈 비율</h3>
                        <span style="font-size:12px; opacity:0.7; padding:4px 8px; border:1px solid rgba(255,255,255,0.15); border-radius:999px;">예시 UI</span>
                    </div>
                    ${mockIssueHtml}
                </section>

                <section class="result-section" style="background:var(--bg-card); padding:20px; border-radius:12px;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                        <h3 style="margin:0;">🔗 장단점 근거 링크</h3>
                        <span style="font-size:12px; opacity:0.7; padding:4px 8px; border:1px solid rgba(255,255,255,0.15); border-radius:999px;">예시 UI</span>
                    </div>
                    ${mockReferenceHtml}
                </section>

                <section class="result-section" style="background:var(--bg-card); padding:20px; border-radius:12px;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                        <h3 style="margin:0;">📈 다른 제품 언급량 그래프</h3>
                        <span style="font-size:12px; opacity:0.7; padding:4px 8px; border:1px solid rgba(255,255,255,0.15); border-radius:999px;">예시 UI</span>
                    </div>
                    ${mockModelChartHtml}
                </section>

                <section class="result-section" style="background:var(--bg-card); padding:20px; border-radius:12px;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                        <h3 style="margin:0;">⏱ 시간에 따른 평가 변화</h3>
                        <span style="font-size:12px; opacity:0.7; padding:4px 8px; border:1px solid rgba(255,255,255,0.15); border-radius:999px;">예시 UI</span>
                    </div>
                    ${mockTimelineHtml}
                </section>
            </div>
        `;
    }
    const rankingData = {
        mouse: [
            { rank: 1, name: "로지텍 G PRO X SUPERLIGHT 2"},
            { rank: 2, name: "레이저 데스애더 V3 PRO"},
            { rank: 3, name: "로지텍 G102 2세대"},
            { rank: 4, name: "팜그립 게이밍 마우스 A"},
            { rank: 5, name: "초경량 게이밍 마우스 B"}
        ],
        keyboard: [
            { rank: 1, name: "키크론 Q1 Pro"},
            { rank: 2, name: "앱코 K640" },
            { rank: 3, name: "레오폴드 FC750RBT"},
            { rank: 4, name: "무접점 키보드 A"},
            { rank: 5, name: "65% 배열 키보드 B" }
        ],
        headset: [
            { rank: 1, name: "소니 WH-1000XM5"},
            { rank: 2, name: "애플 에어팟 맥스"},
            { rank: 3, name: "젠하이저 HD 599"},
            { rank: 4, name: "게이밍 헤드셋 A"},
            { rank: 5, name: "게이밍 헤드셋 B"}
        ],
        monitor: [
            { rank: 1, name: "LG 27GP850"},
            { rank: 2, name: "삼성 오디세이 G5"},
            { rank: 3, name: "DELL U2720Q"},
            { rank: 4, name: "32인치 QHD 모니터 A"},
            { rank: 5, name: "와이드 모니터 B"}
        ]
    };

    const titleMap = {
        mouse: '마우스 TOP 5',
        keyboard:'키보드 TOP 5',
        headset: '헤드셋 TOP 5',
        monitor: '모니터 TOP 5'
    };

    const top5Tabs = document.querySelectorAll('.top5-tab');
    const top5TitleEl = document.getElementById('top5-title');
    const top5ListEl = document.getElementById('top5-list');

    function renderTop5(category) {
        const list = rankingData[category] || [];
        top5TitleEl.textContent = titleMap[category] || 'TOP 5';
        top5ListEl.innerHTML = '';

        list.forEach(item => {
            const li = document.createElement('li');
            li.className = 'top5-item';
            li.innerHTML = `
                <span class="top5-rank">#${item.rank}</span>
                <span class="top5-name">${item.name}</span>
            `;
            li.addEventListener('click', () => {
                keywordInput.value = item.name;
                keywordInput.focus();
            });
            top5ListEl.appendChild(li);
        });
    }

    top5Tabs.forEach(btn => {
        btn.addEventListener('click', () => {
            top5Tabs.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderTop5(btn.dataset.category);
        });
    });

    renderTop5('mouse');
});
</script>
</body>
</html>
